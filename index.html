<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick Converter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="head">
      <h2>↪️ Quick <span> Converter ↩️</span> </h2>
    </div>
    <div class="Container">
      <h2> Binary to Decimal </h2>
      <input id="bi" type="text">
      <input id="b" type="button" value="Convert">
      <p class="in b"> Decimal Numbers </p>
    </div>
    <div class="web">
      <div class="Container">
        <h2> Decimal to binary </h2>
        <input id="di" type="text">
        <input id="d" type="button" value="Convert">
        <p class="in d"> Binary Numbers </p>
      </div>
     <footer>Copyright &copy; QuickConverter 2022 </footer>

</body>
<script src="index.js">index.js</script>

</html>
